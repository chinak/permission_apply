# 国泰君安期货移仓业务管理系统 - Nginx 配置
# 将此文件内容添加到服务器的 /etc/nginx/conf.d/ 或 sites-available/ 目录
# 修改 server_name 为你的实际域名或公网 IP

server {
    listen 80;
    # listen 443 ssl;  # 如需 HTTPS，取消注释并配置 SSL 证书
    server_name your-domain.com;  # 替换为你的域名或公网 IP

    # SSL 证书配置（如需 HTTPS）
    # ssl_certificate     /etc/nginx/ssl/your-domain.com.pem;
    # ssl_certificate_key /etc/nginx/ssl/your-domain.com.key;

    # 网站根目录 - 修改为实际部署路径
    root /var/www/management-platform;
    index index.html;

    # gzip 压缩配置
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_vary on;
    gzip_disable "MSIE [1-6]\.";

    # 静态资源缓存（带 hash 的文件名可长期缓存）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA 路由支持 - 所有路由回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html 不缓存，确保更新及时生效
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # 错误页面
    error_page 404 /index.html;

    # 文件上传大小限制（如需要）
    client_max_body_size 20m;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
